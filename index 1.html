<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة تخمين الشخصيات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>خَمّن الشخصية</h1>
        <p id="hint-text" class="hint"></p>

        <!-- شبكة التخمين -->
        <div id="board" class="board"></div>

        <!-- لوحة المفاتيح -->
        <div id="keyboard" class="keyboard"></div>
    </div>

    <!-- نافذة القصة التي تظهر عند الحل -->
    <div id="story-modal" class="modal">
        <div class="modal-content">
            <h2 id="character-name"></h2>
            <p id="character-story"></p>
<button onclick="document.getElementById('story-modal').style.display='none'">إغلاق وحفظ النتيجة</button>        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
